<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Define gradients and styles -->
  <defs>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891B2;stop-opacity:1" />
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background with subtle gradient -->
  <rect width="512" height="512" fill="#F0F9FF"/>
  
  <!-- Decorative background circle -->
  <circle cx="256" cy="256" r="200" fill="#E0F2FE" opacity="0.5"/>
  <circle cx="256" cy="256" r="180" fill="#CFF0F5" opacity="0.3"/>

  <!-- Main checkmark symbol (stylized pen concept) -->
  <g transform="translate(256, 256)" filter="url(#softGlow)">
    <!-- Outer accent circle -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="url(#mainGradient)" stroke-width="2" opacity="0.2" stroke-dasharray="8,8"/>
    
    <!-- Inner circle background for icon -->
    <circle cx="0" cy="0" r="120" fill="white" opacity="0.9"/>
    
    <!-- Checkmark lines (forming stylized pen) -->
    <!-- Lower diagonal (pen barrel) -->
    <path d="M -40 30 L 20 -30" stroke="url(#mainGradient)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Upper diagonal (pen tip) -->
    <path d="M 20 -30 L 90 -90" stroke="url(#accentGradient)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Pen nib accent (small accent point) -->
    <circle cx="100" cy="-100" r="8" fill="#06B6D4" opacity="0.9"/>
    <circle cx="100" cy="-100" r="14" fill="none" stroke="#06B6D4" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Text: AUDITE.AI -->
  <text x="256" y="420" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="72" font-weight="800" fill="#1E293B" text-anchor="middle" letter-spacing="-1">
    AUDITE
  </text>
  <text x="420" y="420" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="48" font-weight="700" fill="#06B6D4" letter-spacing="0.5">
    .AI
  </text>

  <!-- Tagline -->
  <text x="256" y="460" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="500" fill="#64748B" text-anchor="middle" letter-spacing="1">
    AUDITORIA INTELIGENTE
  </text>
</svg>
